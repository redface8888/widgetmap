<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte France — Soliguide</title>

<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; background: #fff; color: #111; }
  #controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  #legend { display: flex; gap: 12px; font-size: 12px; color: #666; flex-wrap: wrap; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 3px; vertical-align: middle; }
  button { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #111; cursor: pointer; }
  button:hover { background: #f5f5f5; }
  #map { width: 100%; position: relative; }
  #tooltip { display: none; position: fixed; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; font-size: 12px; pointer-events: none; z-index: 100; min-width: 160px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  #mode-label { margin-top: 6px; font-size: 11px; color: #999; }
</style>
</head>

<body>

<div id="controls">
  <div id="legend">
    <span><span class="dot" style="background:#085041"></span>100%</span>
    <span><span class="dot" style="background:#1D9E75"></span>80–99%</span>
    <span><span class="dot" style="background:#9FE1CB"></span>50–79%</span>
    <span><span class="dot" style="background:#EF9F27"></span>20–49%</span>
    <span><span class="dot" style="background:#F5C4B3"></span>1–19%</span>
    <span><span class="dot" style="background:#F1EFE8;border:1px solid #ccc"></span>Non lancé</span>
  </div>
  <button id="btn">+ 2 ans (scénario central)</button>
</div>

<div id="map"></div>
<div id="tooltip"></div>
<div id="mode-label">Mode : état actuel</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>

// =======================
// DONNÉES
// =======================
var D = {
  "Ain":{a:52,p:668,r:616},"Aisne":{a:10,p:583,r:573},"Allier":{a:43,p:448,r:405},
  "Alpes-de-Haute-Provence":{a:50,p:301,r:251},"Hautes-Alpes":{a:26,p:274,r:248},
  "Alpes-Maritimes":{a:1689,p:1689,r:0},"Ardèche":{a:178,p:447,r:269},
  "Ardennes":{a:33,p:394,r:361},"Ariège":{a:357,p:357,r:0},"Aube":{a:21,p:432,r:411},
  "Aude":{a:53,p:484,r:431},"Aveyron":{a:60,p:407,r:347},"Bas-Rhin":{a:1057,p:1057,r:0},
  "Haut-Rhin":{a:734,p:734,r:0}
};

// =======================
// NORMALISATION
// =======================
function normalizeDeptName(n) {
  if (!n) return "";

  return n
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[–—]/g, "-")
    .replace(/\s+/g, " ")
    .trim();
}

// =======================
// D NORMALISÉ
// =======================
const Dnorm = {};
Object.keys(D).forEach(k => {
  Dnorm[normalizeDeptName(k)] = D[k];
});

// =======================
// MODE
// =======================
var mode = 'now';

function getVal(n) {
  n = normalizeDeptName(n);
  var d = Dnorm[n];
  if (!d) return null;

  return mode === 'now'
    ? d.a
    : Math.round(d.p - d.r * 0.091);
}

function getPct(n) {
  n = normalizeDeptName(n);
  var d = Dnorm[n];
  if (!d) return null;

  return Math.min(100, Math.round(getVal(n) / d.p * 100));
}

function col(p) {
  if (p === null) return '#E8E6DF';
  if (p >= 100) return '#085041';
  if (p >= 80) return '#1D9E75';
  if (p >= 50) return '#9FE1CB';
  if (p >= 20) return '#EF9F27';
  if (p > 0) return '#F5C4B3';
  return '#F1EFE8';
}

// =======================
// TOOLTIP
// =======================
var tt = document.getElementById('tooltip');

// =======================
// CARTE
// =======================
d3.json('https://cdn.jsdelivr.net/npm/datamaps@0.5.10/src/js/data/fra.topo.json')
.then(function(fra) {

  var key = Object.keys(fra.objects)[0];
  var all = topojson.feature(fra, fra.objects[key]).features;

  var metro = all.filter(function(f) {
    var c = d3.geoCentroid(f);
    return c[0] >= -5.5 && c[0] <= 9.7 && c[1] >= 41.2 && c[1] <= 51.2;
  });

  var svg = d3.select('#map').append('svg')
    .attr('width', '100%')
    .attr('viewBox', '0 0 900 900');

  var projection = d3.geoMercator().fitSize([900, 900], {
    type: "FeatureCollection",
    features: metro
  });

  var path = d3.geoPath().projection(projection);

  var ps = svg.selectAll('path')
    .data(metro)
    .join('path')
    .attr('d', path)
    .attr('stroke', '#fff')
    .attr('stroke-width', 0.6)
    .attr('fill', d => col(getPct(d.properties.name)));

  ps.on('mousemove', function(event, d) {

    var n = d.properties.name;
    var key = normalizeDeptName(n);
    var inf = Dnorm[key];

    var pct = getPct(n);
    var val = getVal(n);

    var html = "<strong>" + n + "</strong><br>";

    if (inf && val !== null) {
      html += "Fiches : <strong>" + val.toLocaleString('fr-FR') + "</strong> / " + inf.p.toLocaleString('fr-FR') + "<br>";
      html += "Complétion : <strong>" + pct + "%</strong>";
    } else {
      html += "<span style='color:#999'>Non disponible</span>";
    }

    tt.innerHTML = html;
    tt.style.display = 'block';
    tt.style.left = (event.clientX + 14) + 'px';
    tt.style.top = (event.clientY + 14) + 'px';

  }).on('mouseleave', function() {
    tt.style.display = 'none';
  });

  document.getElementById('btn').addEventListener('click', function() {
    mode = mode === 'now' ? 'future' : 'now';
    this.textContent = mode === 'now'
      ? '+ 2 ans (scénario central)'
      : 'Retour à aujourd\'hui';

    ps.attr('fill', d => col(getPct(d.properties.name)));
  });

});

</script>
</body>
</html>
